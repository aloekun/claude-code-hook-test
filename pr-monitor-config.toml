# pr-monitor-config.toml -- cli-pr-monitor (takt ベース) の設定
#
# pnpm create-pr / pnpm push (--monitor-only) で起動される
# cli-pr-monitor.exe がこのファイルを読み込む。
# カレントディレクトリ (リポジトリルート) を優先的に検索する。

[monitor]
enabled = true
max_duration_secs = 600
check_ci = true
check_coderabbit = true

# review 完了待ち park 制御 (Bb-3 順位 55)。
# CodeRabbit walkthrough 確認後、review 完了をポーリングする CronCreate 経路の
# 待機秒数と最大再チェック回数。コメントアウトで全てデフォルト (5 分 / 5 分 / 3 回) を使用。
# [review_recheck]
# initial_review_wait_secs = 300
# review_recheck_wait_secs = 300
# max_review_rechecks = 3

[takt]
workflow = "post-pr-review"
# task は workflow 名を prefix として含める (ADR-030 §task labeling convention)。
# takt の run dir 命名 `<ts>-<sanitized-task>` から workflow 種別を一意に逆引きするため。
task = "post-pr-review"
extra_args = ["--pipeline", "--skip-git"]

[fix]
# Critical 修正は自動 re-push。Major 以下はユーザー確認後 push。
# "critical" = Critical のみ自動, "major" = Critical+Major 自動, "none" = 全て手動
auto_push_severity = "critical"
push_command = "jj git push"

# auto-push 成功後に `@coderabbitai review` を明示投稿して再レビューを 1 回発火する
# (WP-03 / ADR-019 amendment)。.coderabbit.yaml の
# reviews.auto_review.auto_incremental_review = false と結合する。増分レビューを抑止
# すると fix push だけでは CodeRabbit が再レビューしないため、監視側から明示トリガーする。
# auto_incremental_review が有効な環境で true にすると二重レビューになる (両者を揃える)。
trigger_review_after_push = true

# auto-push 前の品質 gate (PR #224 gate-bypass 対策 B1、fail-closed = ADR-043)。
# push-runner-config.toml の [[quality_gate.groups]] name=group を push 前に実行し、
# FAIL なら push せず action_required に倒す。fix diff が docs-only
# (ADR-035 path 基準) の場合は gate を skip する。
# 緊急バイパス (kill-switch): 環境変数 PR_MONITOR_GATE_DISABLE=1
[fix.gate]
enabled = true
group = "rust-lint-test"

# WP-11 決定論層 (ADR-054): fix diff の scope 検証 gate。CodeRabbit コメント (外部非信頼
# テキスト) 起点の fix が finding 対象外ファイルを改変する prompt injection を block する。
# default OFF (opt-in)。本リポジトリでは dogfood のため有効化する (派生プロジェクトには
# templates 側のコメントアウトで default OFF が継承される)。
# mode: "observe" = violation を記録するが push は続行 (誤検知率の計測用)。
#       "enforce" = violation で auto-push を中止し action_required に倒す (fail-closed)。
# bounded lifetime (ADR-054): dogfood 初期は observe で誤検知ゼロを確認し、その後 enforce に
# 上げる。enforce で 3-5 PR 誤検知ゼロなら本採用、誤検知頻発なら enabled = false で kill。
# 緊急バイパス (kill-switch): 環境変数 PR_MONITOR_SCOPE_GUARD_DISABLE=1
[fix.scope_guard]
enabled = true
mode = "observe"

# ---------------------------------------------------------------------------
# [classifier] — ADR-038 (採用、2026-05-15) 経由のローカル LLM finding classifier。
# このセクションを追加すると master 上で classifier が有効化される。問題が
# 発生した場合は revert PR で `enabled = false` に戻すのが kill-switch。
# 詳細: docs/adr/adr-038-local-llm-finding-classification.md
# ---------------------------------------------------------------------------
[classifier]
enabled = true
model = "mistral:7b"
endpoint = "http://localhost:11434"
timeout_secs = 30
