# pr-monitor-config.toml -- cli-pr-monitor (takt ベース) の設定
#
# pnpm create-pr / pnpm push (--monitor-only) で起動される
# cli-pr-monitor.exe がこのファイルを読み込む。
# カレントディレクトリ (リポジトリルート) を優先的に検索する。

[monitor]
enabled = true
max_duration_secs = 600
check_ci = true
check_coderabbit = true

# review 完了待ち park 制御 (Bb-3 順位 55)。
# CodeRabbit walkthrough 確認後、review 完了をポーリングする CronCreate 経路の
# 待機秒数と最大再チェック回数。コメントアウトで全てデフォルト (5 分 / 5 分 / 3 回) を使用。
# [review_recheck]
# initial_review_wait_secs = 300
# review_recheck_wait_secs = 300
# max_review_rechecks = 3

[takt]
workflow = "post-pr-review"
# task は workflow 名を prefix として含める (ADR-030 §task labeling convention)。
# takt の run dir 命名 `<ts>-<sanitized-task>` から workflow 種別を一意に逆引きするため。
task = "post-pr-review"
extra_args = ["--pipeline", "--skip-git"]

[fix]
# Critical 修正は自動 re-push。Major 以下はユーザー確認後 push。
# "critical" = Critical のみ自動, "major" = Critical+Major 自動, "none" = 全て手動
auto_push_severity = "critical"
push_command = "jj git push"

# ---------------------------------------------------------------------------
# [classifier] — ADR-038 (試験運用) 経由のローカル LLM finding classifier。
# §A-2 P-0 (config opt-in) でこのセクションを追加し、master 上で classifier を
# 有効化する。dogfood で問題が出た場合は revert PR で `enabled = false` に
# 戻すのが kill-switch (§10.6 C 簡易版)。
# 詳細: docs/local-llm-offload-analysis.md §A-2 / §10
# ---------------------------------------------------------------------------
[classifier]
enabled = true
model = "mistral:7b"
endpoint = "http://localhost:11434"
timeout_secs = 30
