# custom-lint-rules.toml — プロジェクト固有のカスタムリントルール
#
# このファイルは .claude/ 直下に配置し、hooks-post-tool-linter が読み込みます。
# プロジェクトごとに異なるルールセットを定義できます。
#
# サポート field の semantic / parse 仕様は lint runner 側 (`src/hooks-post-tool-linter/src/main.rs`)
# の `CustomRule` struct の doc comment を参照してください (順位 103 で追加された rule author 向け
# reference)。planned field (`paths` 等) も同 doc comment に記載されています。
#
# ── ルール定義 ──
#
# [[rules]]
# id          = "ルールID（一意）"
# pattern     = "検出する正規表現パターン"
# severity    = "error" | "warning"
# message     = "違反時のメッセージ"
# why         = "なぜこのルールが必要か（ADR参照など）"
# extensions  = ["対象ファイル拡張子"]
#
# [rules.fix]
# strategy    = "修正戦略の概要"
# steps       = ["修正手順1", "修正手順2"]
#
# [rules.example]
# bad         = "NG例コード"
# good        = "OK例コード"

# ─── ルール①: console.log 禁止 ───

[[rules]]
id = "no-console-log"
pattern = 'console\.\s*log\s*\('
severity = "error"
message = "console.log は本番コードでは使用禁止です"
why = "デバッグコードの残留防止。本番環境では構造化ログ（logger）を使用してください"
extensions = ["ts", "tsx", "js", "jsx"]

[rules.fix]
strategy = "削除 or logger置換"
steps = [
  "デバッグ目的の場合: console.log 行を削除する",
  "ログ出力が必要な場合: logger.debug() / logger.info() に置き換える",
]

[rules.example]
bad = "console.log('user data:', userData);"
good = "logger.debug('user data:', userData);"

# ─── ルール②: 個人を特定する絶対パス禁止 (PII) ───
#
# 由来: PR #75 (post-merge-feedback) で 3 箇所同時発生 (ADR-030 line 143、todo.md line 35/48)、
# PR #74 でも前例。CodeRabbit Major 指摘の頻出パターン。
#
# placeholder 検出回避戦略:
# - Rust regex (1.10) は lookahead 非対応のため、character class のみで除外する
# - 開始 `[A-Za-z]` により `<USER_NAME>` / `<USER>` / `%USERPROFILE%` は自動除外
# - Unix 側も同様に `[a-z]` 開始で `<username>` 等を除外
# - 残る false positive は `C:\Users\Public\` / `C:\Users\Default\` 等のシステム名のみ (md では稀)

[[rules]]
id = "no-personal-paths"
pattern = 'C:\\Users\\[A-Za-z][A-Za-z0-9_-]+\\|/home/[a-z][a-z0-9_-]+/'
severity = "error"
message = "個人を特定する絶対パスが含まれています。プレースホルダ (%USERPROFILE% / ~ / $HOME / <USER_HOME>) に置換してください"
why = "ドキュメントへの PII (実ユーザー名) 流出を防止する。PR #75 で 3 箇所、PR #74 でも類似指摘の前例あり"
extensions = ["md", "txt"]

[rules.fix]
strategy = "プレースホルダ表記に置換"
steps = [
  "Windows: `C:\\Users\\<実名>\\` → `%USERPROFILE%\\` または `~\\`",
  "Unix: `/home/<実名>/` → `~/` または `$HOME/`",
  "ドキュメント例として残す場合: `C:\\Users\\<USER_NAME>\\` のように `<...>` を使う",
]

[rules.example]
bad = '具体的なファイル所在: `C:\Users\alice\.claude\projects\<project-id>\` 配下'
good = '具体的なファイル所在: `%USERPROFILE%\.claude\projects\<project-id>\` 配下'

# ─── ルール③: PowerShell 空 catch ブロック禁止 (swallowed error) ───
#
# 由来: PR #85 で `__parse_transcripts.ps1:8` の空 `catch {}` が CodeRabbit Major 指摘。
# Review Policy 明示的 REJECT 項目「Swallowed errors」。エラー握り潰しは debug 困難化の
# 代表的アンチパターン。
#
# 対応する swallowed error 検出は Bash / TypeScript には既存 lint があるが、
# PowerShell は ADR-007 既存ルールの空白だった。

[[rules]]
id = "no-empty-powershell-catch"
# PowerShell は keyword case-insensitive (`Catch {}` も同義) なので (?i) を付与
pattern = '(?i)catch\s*\{\s*\}'
severity = "error"
message = "空の catch {} ブロックでエラーを握り潰しています"
why = "swallowed error は debug 困難化を招く Review Policy 明示的 REJECT 項目。少なくともログ出力 / 再 throw / 上位への propagate のいずれかが必要"
extensions = ["ps1"]

[rules.fix]
strategy = "ログ出力 or 再 throw or 上位 propagate のいずれかを追加"
steps = [
  "意図的に無視する場合: catch ブロックに理由をコメントで明記し Write-Verbose / Write-Debug を追加",
  "原因を log する場合: catch { Write-Error $_ } にする",
  "上位に伝播する場合: catch { throw } にする",
  "そもそも try/catch 不要なら削除する",
]

[rules.example]
bad = 'try { Get-Item $path } catch {}'
good = 'try { Get-Item $path } catch { Write-Verbose "expected miss: $_"; $null }'

# ─── ルール④: PowerShell -ErrorAction SilentlyContinue 警告 ───
#
# 由来: 同 PR #85。空 catch との組合せで二重に swallowed error を生む。
# 単独使用は一部の存在チェック (例: Get-Item -ErrorAction SilentlyContinue) で
# 正当な場合があるため severity = "warning" に留める。
# 空 catch (上の error) と同時に検出されたら、両方の violation が出力される。

[[rules]]
id = "no-silent-error-action"
# PowerShell は parameter 名 case-insensitive (`-erroraction silentlycontinue` も同義) なので (?i) を付与
pattern = '(?i)-ErrorAction\s+SilentlyContinue'
severity = "warning"
message = "-ErrorAction SilentlyContinue はエラー握り潰しのリスクがあります"
why = "存在チェックでは正当だが、結果を確認せずに使うと swallowed error。空 catch と組み合わさると二重に危険"
extensions = ["ps1"]

[rules.fix]
strategy = "戻り値を確認するか、明示的なエラーハンドリングに切替"
steps = [
  "存在チェックの場合: 戻り値が $null かをチェックする",
  "より明示的にしたい場合: -ErrorAction Stop + try/catch を使う",
  "本当にログ抑止だけ必要な場合: -ErrorAction Ignore + コメントで理由を書く",
]

[rules.example]
bad = '$data = ConvertFrom-Json $raw -ErrorAction SilentlyContinue'
good = 'try { $data = ConvertFrom-Json $raw -ErrorAction Stop } catch { Write-Error "Invalid JSON: $_"; throw }'

# ─── ルール⑤: Markdown 非 ASCII GFM アンカー検出 (mutable anchor) ───
#
# 由来: PR #89 で CodeRabbit が日本語 heading への GFM 自動 anchor link を Major 指摘。
# 全リポジトリ grep で 3 ファイルにわたる同一パターンを発見。GFM の自動 anchor 生成は
# heading text のスラッグ化で日本語含む heading は脆弱な ID を生成し、heading text 変更で
# silent break する。
#
# Rust regex 制約: lookbehind 非対応のため `.md` 内で backtick (inline code) に
# 囲まれた link 例は誤検出する。本ルールを説明する文書で例を書く場合は、
# heading 自体を ASCII にするか、コード ブロックではなく説明文として書く。
# (本 TOML 自体は extensions = ["md"] にマッチしないため lint 対象外)

[[rules]]
id = "no-mutable-anchor"
# path 部から `:` を除外することで http(s):// など外部 URL の fragment を除外
# (外部 URL は GFM anchor ではないため対象外)。
# protocol-relative URL (`//example.com/...`) は `:` を含まないため除外できないが、
# Markdown 文書では稀なので許容する。
pattern = '\]\([^)#:]*#[^\x00-\x7F)]+'
severity = "warning"
message = "非 ASCII GFM アンカー (mutable anchor) を検出しました"
why = "GFM 自動 anchor は heading text からスラッグ化されるため、日本語見出しを参照すると heading 編集で silent break する。安定 ASCII ID を持つ <a id=\"...\"></a> 明示アンカーを使ってください"
extensions = ["md"]

[rules.fix]
strategy = "明示的な ASCII ID アンカーへの置換"
steps = [
  "参照先の heading の前に <a id=\"stable-ascii-id\"></a> を追加",
  "リンク側を [text](file.md#stable-ascii-id) に変更",
  "或いは見出し自体を ASCII にできるならそうする",
]

[rules.example]
bad = 'See [推奨実行順序](todo-summary.md#推奨実行順序サマリー)'
good = 'See [推奨実行順序](todo-summary.md#recommended-order-summary)  <!-- with <a id="recommended-order-summary"></a> in target file -->'

# ─── ルール⑥: 非 docs ファイルからの ephemeral todo 参照禁止 ───
#
# 由来: PR #94 で 3 種類のファイル (Rust raw string literal / TOML config comment /
# JSONC config header) で ephemeral 参照が発見された。
# `~/.claude/rules/common/coding-style.md` の Cross-File Reference Lifecycle ルール
# (永続成果物 → ephemeral artifact 参照禁止) の決定論的検出層。
#
# extensions の選定:
# - 当初設計 (PR #94) では rs/toml/jsonc/json/ts/tsx/js/jsx/py/ps1 のみを対象に列挙
# - PR #110 で yaml/yml を追加: takt workflow yaml / GitHub Actions yaml 等の
#   YAML config も permanent artifact として ephemeral 参照を含み得るため
#
# Self-exclusion 設計:
# Rust regex は lookbehind 非対応のため負 lookahead は使用不可。本ファイル自身は
# .toml 拡張子で対象内だが、message / why / example 内に concrete `docs/todoN.md`
# (N = digit 形式) を書かないことで self-trigger を回避する。placeholder の N は
# digit class `[0-9]` に matches しないため pattern が hit しない。

[[rules]]
id = "no-ephemeral-todo-reference"
pattern = '(?i)docs/todo[0-9]*\.md'
severity = "warning"
message = "永続成果物から ephemeral todo entry への literal 参照を検出。stale pointer 化リスクあり"
why = "Cross-File Reference Lifecycle ルール (~/.claude/rules/common/coding-style.md) の決定論的防止層。todo entry が完了削除されると参照が壊れる。安定 anchor (ADR / PR 番号 / 安定 docs パス) に置き換えてください"
extensions = ["rs", "toml", "jsonc", "json", "yaml", "yml", "ts", "tsx", "js", "jsx", "py", "ps1"]

[rules.fix]
strategy = "ADR / PR 番号 / 安定 docs パスへの置換"
steps = [
  "ADR がある場合: docs/adr/adr-NNN-...md へのリンクに置換",
  "PR 由来の判断の場合: PR #NNN を参照 (具体的な行は git log / git blame で追える)",
  "それ以外: docs/<task-list> placeholder を使うか、参照を inline で展開",
]

[rules.example]
bad = 'BLOCK_MESSAGE: &str = "詳細: docs/todoN.md (N = 数字) の \"<section>\" 参照";'
good = 'BLOCK_MESSAGE: &str = "詳細: docs/adr/adr-NNN-feature.md 参照";'

# ─── ルール⑦: Rust 時刻フィールドの strict `>` 比較禁止 (boundary inconsistency 防止) ───
#
# 由来: PR #101 で `parse_listed_findings` の `c.created_at > push_time` が CodeRabbit
# Minor 指摘 → 同一ファイル内 3 関数 (parse_listed_findings / parse_new_comments /
# parse_findings) で `>` vs `>=` の latent drift が判明 (parse_rate_limit のみ既に `>=`)。
# 時刻フィールドの strict `>` は境界 (push_time と同時刻のイベント) を silently 除外
# するため、`>=` への揃えを構造的に強制する。
#
# 由来: PR #101 post-merge-feedback Tier 1 #2 採用、Bundle Z #B-α と同じ
# 「決定論的防止層」哲学 (ADR-007 の正規表現層)。
#
# Direction-specific 設計 (`>` のみ flag):
# `<` の strict 比較は別文脈 (例: is_stale の `created_at < threshold` =
# TTL 内/外判定) で意図的な exclusive 境界として正しいケースが多いため
# false positive 回避のため scope を `>` に限定。`<` 側の boundary 問題は
# 観測されたら別 rule で対応する。

[[rules]]
id = "no-time-field-strict-greater"
pattern = '\b(created_at|submitted_at|updated_at|comment_event_time|event_time|comment_created_at|published_at|posted_at|commented_at)\s*>\s*[a-zA-Z_]'
severity = "warning"
message = "時刻フィールドの strict `>` 比較を検出。境界 (同時刻イベント) を silently 除外するため `>=` 比較への揃えを推奨"
why = "PR #101 で同一ファイル内 3 関数で `>` vs `>=` の latent drift が判明 (parse_listed_findings の `c.created_at > push_time` が CR Minor 指摘 → 揃え修正)。時刻フィールドの strict inequality は境界の inclusive/exclusive choice を不可視にし、bug class を生む。`>=` への揃えで boundary を明示する"
extensions = ["rs"]

[rules.fix]
strategy = "`>=` への置き換え (境界 inclusive)"
steps = [
  "`field > rhs` を `field >= rhs` に変更 (同時刻のイベントを含める)",
  "意図的に exclusive にする場合: 比較対象を 1 単位ずらす (`field >= rhs.checked_add(1)?` 等) かコメントで意図を明示",
  "false positive (時刻でない `created_at` 等) の場合: 変数名を時刻と紛らわしくない名前にリネーム",
]

[rules.example]
bad = "comments.iter().filter(|c| c.created_at > push_time)"
good = "comments.iter().filter(|c| c.created_at >= push_time)"

# ─── ルール⑧: docs/ 内 Markdown の `../docs/` 相対パストラップ検出 ───
#
# 由来: PR #133 (50KB 分割系列、Bundle j-1 = 順位 94 採用) で
# `[ADR-036](../docs/adr/adr-036-...)` 形式の壊れ link が docs/ 配下で混入し
# CodeRabbit Minor 指摘。docs/ 配下のファイルから `../docs/` を辿ると `docs/docs/` を
# 指すため directory nesting mismatch で必ず broken link。pre-existing bug が分割で
# 表面化した経緯。Custom lint rule で書いた瞬間に block すれば本 bug class が排除される。
#
# Bundle Z #B-α と同じ「決定論的防止層」哲学 (ADR-007 の正規表現層)。
#
# 自己限定設計 (extensions = ["md"] のみ、`paths` filter 未適用):
# pattern `](../docs/` は parent-directory 参照を伴う `docs/` への back-link で、
# 文書 が docs/ 配下 (または同等位置) にある場合のみ意味を持つ。root-level README.md
# 等の通常 Markdown では `](docs/...)` 形式が自然で `](../docs/...)` は出現しない
# ため、pattern semantics で自己限定される。
#
# Phase D D-3 (順位 102) で `paths` filter は実装済 だが、本 rule への適用は
# **意図的に保留** (2026-05-12)。理由: D-2 (順位 101) で追加した root-level MD
# (CLAUDE.md / README.md) からの `../docs/` 参照を fire = true positive で扱う
# design intent が、production レベルで `paths = ["docs/**/*.md"]` 適用により
# scope narrow されて壊れる (root-level MD の実 path は docs/ 配下ではないため
# rule 対象外になり、broken link が検出できなくなる)。順位 102 land 後の trade-off
# 検討は別 PR で行う (todo: 順位 102 follow-up「rule⑧ への paths 適用範囲検討」)。
#
# Self-exclusion: 本 TOML の message / why / example で説明文として `](../docs/`
# 形式を直接記述しないこと (lint 対象は extensions = ["md"] のみで .toml は対象外
# だが、説明用に書く場合も backtick code 内の同パターンが他文書に流れる事故を予防)。

[[rules]]
id = "no-docs-relative-back-to-docs"
# case-insensitive で safety margin (URL fragment / Windows path 大文字違い等)
pattern = '(?i)\]\(\.\./docs/'
severity = "error"
message = "`docs/` 配下から `../docs/` への相対参照は directory nesting mismatch で必ず broken link になります"
why = "PR #133 で同パターンの壊れ link が混入し CodeRabbit Minor 指摘 (docs/ 内 file から `../docs/` を辿ると `docs/docs/` を指すため必ず not found)。`(filename.md)` (同階層) または `adr/file.md` (sub-dir) で書く"
extensions = ["md"]

[rules.fix]
strategy = "相対パスを正しい階層に置き換え"
steps = [
  "同階層の場合: `[text](filename.md)` (相対参照なし)",
  "サブディレクトリの場合: `[text](adr/filename.md)` 等の forward path",
  "親ディレクトリ (docs/ の外) を参照したい場合: `../<外側>/` (docs/ を再参照しない)",
]

[rules.example]
# 説明文中で実際の trap pattern を直接書かないため、placeholder 形式で示す
bad = "[ADR-036](DOTDOT/docs/adr/adr-036-...)  <!-- DOTDOT は ../ の意。実際は `..` 2 文字 -->"
good = "[ADR-036](adr/adr-036-...)"

# ─── ルール⑨: takt workflow yaml で persona: を持つ step に model: 必須 ───
#
# 由来: Bundle Y2 (PR #98) で post-pr-review.yaml supervise step に model: が
# 未指定であることが post-merge-feedback で指摘された。persona: を持つ step で
# model: 未指定は default に落ちるため、Bundle Y2 ゴール (analyze 系 haiku /
# supervise・fix は sonnet) では現時点で偶然合致しているが、将来 default 変更や
# persona 追加で意図せぬモデル選択が混入しうる。custom-lint-rule で書いた瞬間に
# block すれば bug class が排除される。
#
# Bundle Z #B-α と同じ「決定論的防止層」哲学 (ADR-007 の正規表現層)。
#
# 検出ロジック (multi-line regex):
# persona: 行の直後の indented field 行が「model: 以外」の場合に flag する。
# field 名 enumeration 方式で takt yaml の sibling field を列挙し、新規 field が
# 増えた際は明示的に rule 拡張する形を取る (= 学習機会化)。Rust regex は lookahead
# 非対応のため negation by enumeration が pragmatic。
#
# Path filter (.takt/workflows/*.yaml 限定):
# 順位 102 (PR #148) で実装した paths filter で範囲を絞り、.github/workflows/
# 等の他 yaml への誤発火を防ぐ。

[[rules]]
id = "takt-workflow-persona-without-model"
pattern = '(?m)^[ \t]+persona:[ \t]+[\w-]+[ \t]*\r?\n[ \t]+(?:policy|instruction|edit|provider_options|knowledge|condition|rules|inputs|outputs|allowed_tools|disallowed_tools|name|type|cmd|when|description|tool|tools|output_contracts|pass_previous_response|required_permission_mode|parallel):'
severity = "error"
message = "takt workflow で persona: の直後に model: が指定されていません。default 落ち防止のため model: <sonnet|haiku|opus> を明示してください"
why = "PR #98 post-merge-feedback で post-pr-review.yaml supervise step の model: 未指定が指摘された。default 落ちは将来 default 変更や persona 追加で意図せぬモデル選択を生む。Bundle Z #B-α と同じ決定論的防止層 (ADR-007 の正規表現層)"
extensions = ["yaml"]
paths = [".takt/workflows/*.yaml"]

[rules.fix]
strategy = "persona: の直後に model: <sonnet|haiku|opus> を追加"
steps = [
  "supervisor 系 step: model: sonnet を追加 (deep reasoning が必要)",
  "code-reviewer 系 analyze step: model: haiku を追加 (低 cost で十分)",
  "coder 系 fix step: model: sonnet を追加 (Bundle Y2 既定)",
  "judge / loop_monitor block の persona: にも明示推奨 (clean baseline 維持)",
]

[rules.example]
bad = '''      persona: supervisor
      instruction: loop-monitor-reviewers-fix'''
good = '''      persona: supervisor
      model: sonnet
      instruction: loop-monitor-reviewers-fix'''

# ─── ルール⑩: `let _ = write_*` swallowed error 検出 (silent failure 防止) ───
#
# 由来: PR #155 simplicity-review が BLOCKING 指摘した `write_skip_report` の Result を
# `let _ =` で silent drop していた問題の構造的防止層 (Bundle l 順位 129)。同 PR の
# `write_report` 経路 (lint_screen.rs) では `if let Err(e) { log_stage(...) }` pattern が
# 確立されていたにもかかわらず、新規追加された I/O write 関数で reuse されず再発した。
# 今後の I/O 関数追加で同 anti-pattern が混入することを機械的に防ぐ。
#
# Scope 限定 (extensions = ["rs"]、prefix scope = "write_"):
# `let _ = write_<name>(` の形だけを flag。`let _ = stream.flush()` や
# `let _ = drop(handle)` 等の non-write 関数は false positive にしない。
# 「write_」prefix は本リポジトリの I/O 書込関数命名規約 (write_state /
# write_failed_marker / write_pending_marker / write_skip_report / write_report 等) と整合。
#
# Self-exclusion: 本 TOML は extensions = ["rs"] により対象外。example.bad / good は
# literal で書ける。

[[rules]]
id = "no-write-result-discard"
pattern = 'let\s+_\s*=\s+write_\w+\('
severity = "error"
message = "`let _ = write_*` で I/O 書込関数の Result を silent drop しています"
why = "silent failure は debug 困難化を招く。`write_` 関数は I/O 失敗 (権限/ディスク容量/lock) を返すため、最低でも log_stage / log_warn / eprintln! 等で観測可能にする必要がある。PR #155 simplicity-review BLOCKING の再発を機械的に防止 (Bundle l 順位 129)"
extensions = ["rs"]

[rules.fix]
strategy = "`if let Err(e) = write_*(...) { log_stage(STAGE, &format!(...)); }` または `*_logged` ヘルパー抽出"
steps = [
  "stage 内なら: `if let Err(e) = write_foo(...) { log_stage(STAGE, &format!(\"skip: ...: {}\", e)); }`",
  "Drop 実装内なら: `if let Err(e) = write_foo(...) { eprintln!(\"[component] ...: {}\", e); }` (log macro が panic 安全でない場合)",
  "意図的に drop が必要な場合: コメントで理由を明記し `// SAFETY:` 風のマーカーを付ける",
  "再利用される pattern なら lint_screen.rs の `write_skip_report_logged` のような helper を抽出",
]

[rules.example]
bad = "let _ = write_state(&state);"
good = "if let Err(e) = write_state(&state) { log_warn(&format!(\"state write failed: {}\", e)); }"
