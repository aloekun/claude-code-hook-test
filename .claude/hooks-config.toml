# hooks-config.toml — プロジェクト固有の hooks 設定
#
# このファイルは各 hook exe と同じディレクトリ (.claude/) に配置します。
# 設定ファイルが存在しない場合、各 hook はデフォルト動作にフォールバックします。

# ─── PreToolUse: コマンド検証 ───

[pre_tool_validate]
# ブロックパターンのプリセット名を指定
#   "default"       — rm -rf, cd /d (ほぼ全プロジェクト共通)
#   "git"           — git コマンドブロック (jj 利用プロジェクト向け)
#   "jj-immutable"  — jj --ignore-immutable
#   "jj-main-guard" — jj new main / jj edit main
#   "jj-push-guard" — jj git push / jj push 禁止 (pnpm push に誘導)
#   "electron"      — Electron GUI 実行ブロック
# プリセット名以外の文字列は正規表現としてカスタムパターン扱い
blocked_patterns = [
  "default",
  "git",
  "jj-immutable",
  "jj-main-guard",
  "jj-push-guard",
  "electron",
]

# 追加の保護ファイル (デフォルトリストに追加)
extra_protected_files = []

# ─── PostToolUse: カスタムリンター ───
# プロジェクト固有のカスタムルールは custom-lint-rules.toml に定義。
# 正規表現ベースのリテラルマッチのみ。AST解析が必要なルールは
# ast-grep を下記パイプラインのステップとして追加する (ADR-007)。

# ─── PostToolUse: リンター ───

[post_tool_linter]

[[post_tool_linter.pipelines]]
extensions = ["ts", "tsx", "js", "jsx"]
steps = [
  { cmd = "npx", args = ["--no-install", "biome", "format", "--write", "{file}"], fix = true },
  { cmd = "npx", args = ["--no-install", "oxlint", "--fix", "{file}"], fix = true },
  { cmd = "npx", args = ["--no-install", "oxlint", "{file}"], fix = false },
]

[[post_tool_linter.pipelines]]
extensions = ["py"]
steps = [
  { cmd = "ruff", args = ["check", "--fix", "{file}"], fix = true },
  { cmd = "ruff", args = ["format", "{file}"], fix = true },
  { cmd = "ruff", args = ["check", "{file}"], fix = false },
]

# ─── Stop: 品質ゲート ───

[stop_quality]
step_timeout = 60

[[stop_quality.steps]]
name = "lint"
cmd = "pnpm lint"

[[stop_quality.steps]]
name = "test"
cmd = "pnpm test"

[[stop_quality.steps]]
name = "test:e2e"
cmd = "pnpm test:e2e"

[[stop_quality.steps]]
name = "build"
cmd = "pnpm build"

# ─── Push Pipeline: push 前パイプライン ───
#
# pnpm push で起動されるパイプライン。
# PreToolUse の "jj-push-guard" プリセットにより直接の jj git push はブロックされ、
# このパイプラインを通すことが強制される。
#
# ステップの type:
#   "command" — シェルコマンドを実行。exit code 0 で成功判定
#   "ai"     — AI 処理が必要なステップ (将来実装、現在は placeholder)

[push_pipeline]
step_timeout = 600
push_cmd = "jj git push"

[[push_pipeline.steps]]
name = "integration_test"
type = "command"
cmd = "pnpm test"

[[push_pipeline.steps]]
name = "ai_review"
type = "command"
cmd = "pnpm review:ai"

[[push_pipeline.steps]]
name = "commit_refactor"
type = "ai"
prompt = "optimize_commit_structure"

# ─── PostToolUse: PR モニター ───
#
# gh pr create / git push / jj git push 検出後に
# CI + CodeRabbit の自動モニタリングを CronCreate で開始する。
# check-ci-coderabbit.exe によるポーリングで監視し、
# 結果の action フィールドに従って Claude が行動する。

[post_pr_monitor]
enabled = true
poll_interval_secs = 30      # CronCreate のポーリング間隔（秒）
max_duration_secs = 600      # 最大監視時間（秒、10分）
check_ci = true              # GitHub Actions の監視
check_coderabbit = true      # CodeRabbit レビューの監視
# trigger_patterns をコメントアウトまたは未設定 → デフォルトトリガー有効
# trigger_patterns = ["gh pr create", "git push", "jj git push"]  # 明示指定する場合
# trigger_patterns = []  # 空配列 = 全トリガー無効化（モニタリング停止）
