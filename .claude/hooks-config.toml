# hooks-config.toml — プロジェクト固有の hooks 設定
#
# このファイルは各 hook exe と同じディレクトリ (.claude/) に配置します。
# 設定ファイルが存在しない場合、各 hook はデフォルト動作にフォールバックします。

# ─── SessionStart: セッション ID 伝播 ───
#
# SessionStart hook がセッション ID を以下に書き出す:
#   1. $CLAUDE_ENV_FILE → Bash ツールの環境変数 (CLAUDE_CODE_SESSION_ID)
#   2. .claude/.session-id → 子プロセス exe から読み取り可能
# 同一 ID ならスキップ、異なる ID なら上書きする方式。
# ※ cli-pr-monitor は daemon + state file 方式に移行済みのため
#   .session-id の直接参照は不要になったが、将来の拡張用に維持。

# [session_start]
# - staleness: 順位 136 案 A (試験運用、ADR-039 experimental pattern 準拠)。
#   `jj git fetch` で master を最新化し、`@-..master` の commit 数 (working copy
#   が遅れている分) を additionalContext に出力する。
#   3-5 PR の dogfood 後に default-ON 昇格 or 却下を判定 (bounded lifetime)。
#   Kill-switch: `enabled = false` で完全停止。
[session_start.staleness]
enabled = true
fetch_timeout_secs = 3        # jj git fetch 全体の timeout (network 異常で session 起動を阻害しない)
fetch_cache_secs = 300        # FETCH_HEAD mtime が N 秒以内なら fetch をスキップ (network cost 抑制)
default_branch = "master"     # trunk-based 前提、feature branch 運用では変更
# workspace stale 検知 nudge (ADR-045 § Known operational risks、C2)。並列 workspace の操作で
# working copy が stale になったら `jj workspace update-stale` を促す (自動実行はしない)。
# default-OFF (ADR-039 § 1)、本リポジトリは並列 workspace 運用のため有効化して dogfood。
stale_check_enabled = true

# [session_start.weekly_review_reminder]
# - ADR-031 Phase C: `/weekly-review` skill 起動の reminder (試験運用、ADR-039 experimental pattern 準拠)。
#   2 経路で発火:
#     1. `.claude/weekly-review-last-run.json` の mtime が `reminder_threshold_days` 超過
#     2. `.claude/weekly-reviews/*.md.failed` marker 1 件以上残存 (前回失敗 resume promote)
#   両方該当する場合は 1 nudge にまとめて出力。
#   3-5 週の dogfood 後に default-ON 昇格 or 却下を判定 (bounded lifetime)。
#   Kill-switch: `enabled = false` で完全停止。
[session_start.weekly_review_reminder]
# 試験運用元 (本リポジトリ) では明示的に enable して reminder を実発火させる運用。
# ADR-031 は 2026-06-01 で本採用化済み、Phase E 観測で「reminder 未発火 = silent」だった
# 問題に対処するため試験運用元での enable に切替 (2026-06-23、PR-1)。
# 派生プロジェクト deploy 時は default OFF (ADR-039 § 1 opt-in 契約) を維持。
# 次 PR (PR-3) で `[features].enabled` allow-list 方式に移行予定 = 本 `enabled = true` は暫定。
enabled = true
reminder_threshold_days = 7        # ADR-031 § トリガー方式: 「前回実行から 7 日経過で promote」と整合
failed_marker_check_enabled = true # 前回失敗 marker 検出 → resume promote。false で staleness のみに限定可

# ─── PreToolUse: コマンド検証 ───

[pre_tool_validate]
# ブロックパターンのプリセット名を指定
#   "default"       — rm -rf, cd /d (ほぼ全プロジェクト共通)
#   "git"           — git コマンドブロック (jj 利用プロジェクト向け)
#   "jj-immutable"  — jj --ignore-immutable
#   "jj-main-guard" — jj new main / jj edit main
#   "jj-push-guard" — jj git push / jj push 禁止 (pnpm push に誘導)
#   "gh-pr-merge-guard" — gh pr merge ブロック (pnpm merge-pr に誘導)
#   "polling-anti-pattern" — until/while ! ... sleep の polling ループをブロック
#                              (rate-limit 浪費防止、PR #86 T1-1)
#   "exe-help-block" — 本リポジトリの Rust 製 exe (.claude/*.exe) + 単独 --help/-h/?
#                              をブロックして src/<exe-name>/src/main.rs Read に誘導
#                              (PR #109 SIGPIPE 事故の直接 trigger を構造的に防止、順位 65 / Bundle c)
#   "electron"      — Electron GUI 実行ブロック
#   "jj-message-required" — jj new / jj split を -m / --message なしでブロック
#                              (混合 commit 事故 + jj split editor hang を構造的に防止、
#                               順位 144 / PR #171 T3-#8 採用)
#   "secret-detection" — AWS / OpenAI / GitHub / Anthropic 等の hardcoded secret を
#                              Bash command + Edit/Write content 双方で検出してブロック
#                              (~/.claude/rules/common/security.md § Secret Management 移管、
#                               順位 146 / PR #200 follow-up 採用、Tier 1 default-on)
#   "gh-repo-env-guard" — GH_REPO 環境変数の場当たり使用をブロックし GIT_DIR /
#                              自動注入 / --repo フラグに誘導 (GH_REPO は引数なし
#                              gh repo view に効かず非 colocated jj workspace で
#                              silent 部分故障を招く、PR #238 実例 / ADR-045)
# プリセット名以外の文字列は正規表現としてカスタムパターン扱い
blocked_patterns = [
  "default",
  "git",
  "jj-immutable",
  "jj-main-guard",
  "jj-push-guard",
  "gh-pr-create-guard",
  "gh-pr-merge-guard",
  "polling-anti-pattern",
  "exe-help-block",
  "electron",
  "jj-message-required",
  "secret-detection",
  "gh-repo-env-guard",
]

# 追加の保護ファイル (デフォルトリストに追加)
extra_protected_files = []

# 順位 136 案 B (試験運用、ADR-039 experimental pattern 準拠)。
# Edit/Write の対象が docs/todo*.md 系列のとき、master と @- の lineage 確認
# (stale 検知) + ### 見出し title からの keyword grep (既実装 commit 提示)。
# stale 検知時は exit 2 で block、grep のみ hit は exit 0 + stderr 出力 (warn-only)。
# 3-5 PR の dogfood 後に default-ON 昇格 or 却下を判定 (bounded lifetime)。
[pre_tool_validate.todo_staleness]
enabled = true
default_branch = "master"       # trunk-based 前提、feature branch 運用では変更
grep_recent_limit = 20          # jj log で参照する直近 commit 数

# ─── PostToolUse: カスタムリンター ───
# プロジェクト固有のカスタムルールは custom-lint-rules.toml に定義。
# 正規表現ベースのリテラルマッチのみ。AST解析が必要なルールは
# ast-grep を下記パイプラインのステップとして追加する (ADR-007)。

# ─── PostToolUse: ファイルサイズチェック ───
# 順位 177 (PR #197 で Tier 1 (優先実装) 格上げ) で実装。
# PostToolUse Edit/Write 直後にファイルサイズを確認し、threshold (50KB) 超過時に
# additionalContext でファイル分割を促す。Claude Code 読み取り安定性閾値 (50KB) を
# 機械強制する custom linter。
#
# ADR-039 § 1.b mechanical lint 例外で default ON (PR #203 で訂正、本 PR で適用):
#   - 失敗 mode が non-blocking (additionalContext warning のみ、ブロックしない)
#   - 判定が決定論的 (50KB 固定閾値、discretionary 判断なし)
#   - 適用 scope が宣言的に限定 (paths glob)
#   - recovery hint が明確 (todo*.md なら新 todo<N+1>.md を新設して移管)
# 同類例: 順位 147 file_length lint (hooks-post-tool-comment-lint-rust) も default ON 固定。
#
# touch-trigger ratchet (default true): 触られたファイルのみチェック = 既存超過
# ファイルは未編集なら grandfather。strict mode (touch_trigger=false で全 enabled
# paths を scan) は MVP では受理のみ。
#
# Kill-switch: enabled = false で完全停止。
[post_tool_use.file_size_check]
enabled = true                                   # ADR-039 § 1.b mechanical lint 例外 (non-blocking + 決定論 + scope 限定 + recovery hint 明確)
threshold_bytes = 51200                          # 50KB (= 50 * 1024)、Claude Code 読み取り安定性閾値
paths = ["docs/**/*.md", "src/**/*.rs"]          # default 対象 glob
touch_trigger = true                             # 触られたファイルのみ check (ratchet)

# jj operation 検証 (ADR-045 § Operation Verification Checklist の自動化、G案)。
# Bash tool で変更系 jj コマンド (new/describe/abandon/rebase/squash/bookmark 変更系) を
# 実行した直後に `jj op log --limit 1` で operation の記録を確認し、無ければ
# 「operation not recorded」警告を additionalContext で返す (non-blocking 助言層)。
# 2026-07-12/13 の並列 workspace lost-update incident の検出網。
# default-OFF (ADR-039 § 1)、本リポジトリは並列 workspace 運用のため有効化して dogfood。
# Kill-switch: enabled = false で完全停止。
[post_tool_use.jj_op_verify]
enabled = true

# ─── PostToolUse: リンター ───

[post_tool_linter]

[[post_tool_linter.pipelines]]
extensions = ["ts", "tsx", "js", "jsx"]
steps = [
  { cmd = "npx", args = ["--no-install", "biome", "format", "--write", "{file}"], fix = true },
  { cmd = "npx", args = ["--no-install", "oxlint", "--fix", "{file}"], fix = true },
  { cmd = "npx", args = ["--no-install", "oxlint", "{file}"], fix = false },
]

[[post_tool_linter.pipelines]]
extensions = ["py"]
steps = [
  { cmd = "ruff", args = ["check", "--fix", "{file}"], fix = true },
  { cmd = "ruff", args = ["format", "{file}"], fix = true },
  { cmd = "ruff", args = ["check", "{file}"], fix = false },
]

[[post_tool_linter.pipelines]]
extensions = ["md"]
steps = [
  { cmd = "npx", args = ["--no-install", "markdownlint-cli2", "--fix", "{file}"], fix = true },
  { cmd = "npx", args = ["--no-install", "markdownlint-cli2", "{file}"], fix = false },
]

# ─── Stop: tool call leak 検知 (ADR-053、試験運用) ───
#
# ツール呼び出しが tool_use block ではなくテキスト領域に `<invoke ...>` XML として
# 出力され、実行されないまま turn が終了する不具合を検知し、block で再実行を促す。
#
# ADR-039 3 点セット:
#   - Config opt-in (default OFF): code default は enabled = false (unwrap_or(false))。
#     本 repo は dogfood のため enabled = true。派生プロジェクト deploy 時は default OFF。
#   - Kill-switch: 恒久停止は enabled = false。緊急バイパスは env
#     STOP_TOOL_CALL_LEAK_OVERRIDE=1 (truthy 値、FILE_LENGTH_CHECK_OVERRIDE と同 pattern)。
#   - Bounded lifetime: 根本原因は上流 (Claude Code / モデルのシリアライズ) の不具合。
#     上流修正の確認、または leak 4 週間非観測で撤去を判定する。
#
# ループ防止: stop_hook_active skip ではなく連続 leak カウント上限で fail-open
# (ADR-004 からの意図的逸脱、再 leak 実績があるため。詳細は ADR-053)。
[stop_tool_call_leak]
enabled = true
max_consecutive_blocks = 3    # 連続 block 上限 (到達で fail-open)

# ─── Stop: 品質ゲート ───

[stop_quality]
# 順位 175 (PR #185 T1-#1): cargo clippy 追加で Rust lint structural gap を補填。
# incremental cache が効く限り 5-15s で完了するため step_timeout=60 内に収まる。
# cold cache の初回のみ超過リスクあり (workspace 全 crate compile)。
step_timeout = 60

[[stop_quality.steps]]
name = "lint"
cmd = "pnpm lint"

[[stop_quality.steps]]
name = "lint:md"
cmd = "pnpm lint:md"

[[stop_quality.steps]]
name = "lint:rust"
cmd = "cargo clippy --workspace -- -D warnings"

[[stop_quality.steps]]
name = "test"
cmd = "pnpm test"

[[stop_quality.steps]]
name = "test:e2e"
cmd = "pnpm test:e2e"

[[stop_quality.steps]]
name = "build"
cmd = "pnpm build"

# 順位 147 / PR-W5 (file-length-enforcement-plan.md): file-length Stop gate。
# PR 範囲 (base branch..@) の .rs file が 800 行超なら Stop を block する強制層。
# cmd は cmd.exe (`cmd /c`) 経由で実行されるため forward-slash (`./`) 始まりは不可。
# backslash 相対パスを TOML literal string (single quote、escape 不要) で指定する。
# gate の有効化は下記 [file_length_gate] enabled で制御 (この step があっても
# enabled = false なら exe は即 exit 0 で no-op)。
[[stop_quality.steps]]
name = "file-length"
cmd = '.\.claude\hooks-post-tool-comment-lint-rust.exe --check-modified-files'

# ─── PR-W5: file-length Stop gate 設定 (ADR-039 experimental feature 標準パターン) ───
#
# hooks-post-tool-comment-lint-rust.exe --check-modified-files が参照する opt-in gate。
# 上の [[stop_quality.steps]] "file-length" step から起動される。
#
# ADR-039 3 点セット:
#   - Config opt-in (default OFF): code default は enabled = false (unwrap_or(false))。
#     本 repo は Phase 1 (PR-W1〜W4) の clean state を dogfood するため enabled = true。
#   - Kill-switch: 恒久停止は enabled = false。緊急バイパスは env
#     FILE_LENGTH_CHECK_OVERRIDE=1 (truthy 値、順位 151 pr_size_check と同 pattern)。
#   - Bounded lifetime: 採否判定は file-length-enforcement-plan.md 削除条件 3
#     (override 未使用で 1-2 セッション通過) を trigger とする。
#
# base: PR 範囲算出の base branch (省略時 "master"、ADR-021 § Revset Composability で引数化)。
[file_length_gate]
enabled = true

# ─── Push Pipeline: push-runner-config.toml に移行済み (ADR-015) ───
#
# pnpm push は cli-push-runner.exe (takt ベース) を使用。
# 設定はリポジトリルートの push-runner-config.toml を参照。
# PreToolUse の "jj-push-guard" プリセットにより直接の jj git push はブロックされ、
# pnpm push を通すことが強制される。

# ─── Merge Pipeline: PR マージ + ローカル同期 ───
#
# pnpm merge-pr で起動されるパイプライン。
# PreToolUse の "gh-pr-merge-guard" プリセットにより直接の gh pr merge はブロックされ、
# このパイプラインを通すことが強制される。
#
# 処理フロー:
#   1. jj bookmark から PR を自動検出
#   2. pre_steps を順次実行（マージ前チェック）
#   3. gh pr merge --squash --delete-branch を実行
#   4. jj git fetch && jj new master でローカル同期
#   5. post_steps を順次実行（学び提案等）

[merge_pipeline]
step_timeout = 120
default_branch = "master"  # "main" など、リポジトリに合わせて変更

# マージ前チェック
# [[merge_pipeline.pre_steps]]
# name = "ci_check"
# type = "command"
# cmd = "gh pr checks --required"

# マージ後のフィードバックループ自動起動 (ADR-029 試験運用)
# cli-merge-pipeline が .claude/post-merge-feedback-pending.json を書き込み、
# hooks-stop-feedback-dispatch が検出して /post-merge-feedback skill を起動する。
[[merge_pipeline.post_steps]]
name = "post_merge_feedback"
type = "ai"
prompt = "post-merge-feedback"

# ─── Post-PR Monitor: daemon + state file ───
#
# pnpm create-pr / pnpm push 実行時に daemon がバックグラウンドで起動し、
# check-ci-coderabbit.exe を定期ポーリングして結果を
# .claude/pr-monitor-state.json に書き出す。
# Claude は CronCreate で state file を cat し、action に従って行動する。
# CronCreate は UX 最適化レイヤーであり、コア機能ではない。
# フォールバック: cat .claude/pr-monitor-state.json で手動確認可能。

[post_pr_monitor]
enabled = true
poll_interval_secs = 120     # CronCreate のポーリング間隔（秒、2分）
max_duration_secs = 600      # 最大監視時間（秒、10分）
check_ci = true              # GitHub Actions の監視
check_coderabbit = true      # CodeRabbit レビューの監視
# trigger_patterns をコメントアウトまたは未設定 → デフォルトトリガー有効
# trigger_patterns = ["gh pr create", "git push", "jj git push", "pnpm push"]  # 明示指定する場合
# trigger_patterns = []  # 空配列 = 全トリガー無効化（モニタリング停止）
