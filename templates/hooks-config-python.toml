# hooks-config.toml — Python プロジェクト向けテンプレート

[pre_tool_validate]
blocked_patterns = [
  "default",
  "git",
  "jj-immutable",
  "jj-main-guard",
]

extra_protected_files = [
  "settings.local.json",
  "settings.local.json.template",
  "hooks-config.toml",
]

[post_tool_linter]

[[post_tool_linter.pipelines]]
extensions = ["py"]
steps = [
  { cmd = "ruff", args = ["check", "--fix", "{file}"], fix = true },
  { cmd = "ruff", args = ["format", "{file}"], fix = true },
  { cmd = "ruff", args = ["check", "{file}"], fix = false },
]

[stop_quality]
step_timeout = 120

[[stop_quality.steps]]
name = "py-lint"
cmd = "pnpm py-lint"

[[stop_quality.steps]]
name = "py-test"
cmd = "pnpm py-test"

[[stop_quality.steps]]
name = "py-test:e2e"
cmd = "pnpm py-test:e2e"

# ─── PostToolUse: PR モニター ───
# gh pr create / git push 検出後に CI + CodeRabbit を自動監視する。
# public リポジトリで CodeRabbit が有効な場合に設定してください。

