# push-runner-config.toml -- cli-push-runner (takt ベース) の設定テンプレート
#
# pnpm push で起動される push-runner.exe がこのファイルを読み込む。
# リポジトリルートに push-runner-config.toml として配置する。
#
# プロジェクトに合わせて quality_gate.groups の commands を変更すること。

[quality_gate]
parallel = true
step_timeout = 120

# プロジェクトの品質チェックコマンドに置き換えてください
#
# `pnpm lint:docs` (cli-docs-lint.exe、deploy:hooks で配布) は ADR-039 試験運用
# 標準パターン適用中のため、本テンプレートでは **default OFF** (commands array
# から除外済)。dogfood する派生 repo は明示的に commands に追加してください:
#   commands = ["pnpm lint", "pnpm lint:docs"]
# Kill-switch: 環境変数 CLI_DOCS_LINT_DISABLE=1 で個別 push の意図的バイパス可能。
# 本リポジトリ (claude-code-hook-test) で 3-5 PR dogfood 後に default-ON 昇格 or
# 却下を判定。判定結果は src/cli-docs-lint/src/main.rs の module doc に反映する。
[[quality_gate.groups]]
name = "lint"
commands = ["pnpm lint"]

[[quality_gate.groups]]
name = "test"
commands = ["pnpm test"]

[[quality_gate.groups]]
name = "build"
commands = ["pnpm build"]

# Rust lint + test group (オプション): Rust を使うプロジェクトのみ有効化してください。
# push pipeline でのみ実行し、PostToolUse / Stop hook では走らせないことで
# イテレーション速度を保護します。
# 前提: ルートに Cargo workspace (Cargo.toml に [workspace] + members) があり、
# `cargo test` で全 package が一括テストされる構成 (ADR-026)。
# clippy は --all-targets で test コードも lint 対象に含める (#[cfg(test)] / integration
# test の lint gap 解消、順位259)。--all-features は将来の feature-gated コード用の保険。
# 統合テストで cwd 操作等がある場合は --test-threads=1 で直列実行してください。
# [[quality_gate.groups]]
# name = "rust-lint-test"
# commands = [
#   "cargo clippy --workspace --all-targets --all-features -- -D warnings",
#   "cargo test",
#   "cargo test -- --ignored --test-threads=1",
# ]

[diff]
# jj 環境: "jj diff -r @"
# git 環境: "git diff origin/HEAD...HEAD"
command = "jj diff -r @"
output_path = ".takt/review-diff.txt"

# ---------------------------------------------------------------------------
# [pre_push_review] — WP-06 / ADR-047 (試験運用): 反証 (refute) facet。
# reviewers と fix の間に verify(refute, haiku) step を挟み、reviewer の
# false positive を fix 前に反証・却下して無駄な fix iteration を削減する試み。
# 本テンプレートでは **default OFF** (ADR-039)。有効化するには verify 入り
# workflow (.takt/workflows/pre-push-review-refute.yaml) と refute facet 群
# (refute-finding.md instruction + refutation-report.md output-contract) を
# 配布したうえで以下を設定:
#   refute_enabled = true
#   refute_workflow = "pre-push-review-refute"
# Kill-switch: refute_enabled = false で現行 pre-push-review へ即戻し。
# ---------------------------------------------------------------------------
[pre_push_review]
refute_enabled = false

[takt]
workflow = "pre-push-review"
task = "pre-push review"
extra_args = ["--pipeline", "--skip-git"]

[push]
# jj 環境: "jj git push"
#   push-runner が bookmark_check stage の検出結果から `-b <name>` を自動付与する
#   (ADR-045 事故 follow-up: `--all` は並列 workspace の他 bookmark を巻き込むため非推奨)。
#   jj 0.42 の `-b` は未 tracking の新規 bookmark を自動 track して push する。
#   `--all` 等の対象明示を含む command はそのまま実行される (後方互換)。
#   新規 bookmark 拒否時 jj は exit 0 のまま "Refusing to create new remote bookmark" を
#   出力するため、push-runner は出力内容でも失敗を検知する (stages/push.rs)。
# git 環境: "git push"
command = "jj git push"
# timeout = 300  # デフォルト 300秒。ネットワーク環境に応じて調整
