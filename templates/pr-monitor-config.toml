# pr-monitor-config.toml -- cli-pr-monitor (takt ベース) の設定
#
# pnpm create-pr / pnpm push (--monitor-only) で起動される
# cli-pr-monitor.exe がこのファイルを読み込む。

[monitor]
enabled = true
poll_interval_secs = 120
max_duration_secs = 600
check_ci = true
check_coderabbit = true

# takt セクションを有効にすると、ポーリング完了後に
# CodeRabbit 指摘の AI 分析を実行する。
# takt がインストールされていない場合はコメントアウトすること。
# [takt]
# workflow = "post-pr-review"
# # task は workflow 名を prefix として含める (ADR-030 §task labeling convention)。
# task = "post-pr-review"
# extra_args = ["--pipeline", "--skip-git"]
