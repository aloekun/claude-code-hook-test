# pr-monitor-config.toml -- cli-pr-monitor (takt ベース) の設定
#
# pnpm create-pr / pnpm push (--monitor-only) で起動される
# cli-pr-monitor.exe がこのファイルを読み込む。

[monitor]
enabled = true
poll_interval_secs = 120
max_duration_secs = 600
check_ci = true
check_coderabbit = true

# takt セクションを有効にすると、ポーリング完了後に
# CodeRabbit 指摘の AI 分析を実行する。
# takt がインストールされていない場合はコメントアウトすること。
# [takt]
# workflow = "post-pr-review"
# # task は workflow 名を prefix として含める (ADR-030 §task labeling convention)。
# task = "post-pr-review"
# extra_args = ["--pipeline", "--skip-git"]

# auto-push 成功後に `@coderabbitai review` を明示投稿して再レビューを 1 回発火する
# (WP-03 / ADR-019 amendment)。default は false。有効化するのは、この派生プロジェクトにも
# .coderabbit.yaml (reviews.auto_review.auto_incremental_review = false) を置いて
# 増分レビューを抑止する場合のみ。auto_incremental_review が有効なまま true にすると
# 二重レビューになるため、必ず .coderabbit.yaml 側と揃えること。
# [fix]
# trigger_review_after_push = true

# auto-push 前の品質 gate (fail-closed = ADR-043)。default は enabled = true で、
# push-runner-config.toml の [[quality_gate.groups]] name="rust-lint-test" を push 前に実行する。
# Rust workspace を持たない派生プロジェクトでは group が見つからず fail-closed で
# auto-push が常に中止されるため、enabled = false にするか対応する group 名を指定すること。
# 緊急バイパス (kill-switch): 環境変数 PR_MONITOR_GATE_DISABLE=1
# [fix.gate]
# enabled = false

# WP-11 決定論層 (ADR-054): fix diff の scope 検証 gate。default OFF (opt-in)。
# 有効化すると、fix が finding 対象外ファイルを変更した場合に auto-push を block する
# (CodeRabbit コメント経由の prompt injection 防御)。派生プロジェクトでは default OFF の
# ままでよい。有効化する場合は mode = "observe" (記録のみ) で誤検知率を確認してから
# "enforce" (violation で push 中止) に上げること。
# 緊急バイパス (kill-switch): 環境変数 PR_MONITOR_SCOPE_GUARD_DISABLE=1
# [fix.scope_guard]
# enabled = false
# mode = "enforce"
