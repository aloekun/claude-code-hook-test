# push-runner-config.toml -- cli-push-runner (takt ベース) の設定
#
# pnpm push で起動される push-runner.exe がこのファイルを読み込む。
# カレントディレクトリ (リポジトリルート) を優先的に検索する。

# ---------------------------------------------------------------------------
# [scratch_file_warning] — 順位 1 (PR #85 T1-4): scratch ファイル混入の防御層。
# `@` commit に `__*` 等の scratch ファイルが含まれていないか push 前に検査し、
# 検出時は push を block する。jj auto-snapshot 環境で .gitignore 漏れがあると
# scratch ファイルが PR に混入する事故 (PR #85 で実証) の構造的予防。
#
# ADR-039 (Experimental feature 標準パターン) 3 点セット:
# - **Config opt-in**: 試験運用のため default OFF。本リポジトリでは明示的に
#   `enabled = true` で dogfood を開始。section 不在 / enabled 未設定では完全 skip。
# - **Kill-switch**: `enabled = false` で完全停止。env `SCRATCH_FILE_WARNING_OVERRIDE=1`
#   で個別 push の意図的バイパスも可能。
# - **Bounded lifetime**: 本リポジトリで 3-5 PR の dogfood 後 (false positive 観測 /
#   検出効果 / override 使用頻度) に default-ON 昇格 or 却下を判定。判定結果は
#   `src/cli-push-runner/src/stages/scratch_file_warning.rs` module doc + 本 section
#   コメントに反映する。
#
# 順位 5 (AI 生成一時スクリプト pattern) で `_tmp_*` 等の追加 pattern を本 section
# の `patterns` に追加する (補完アプローチ)。Bundle 3 で `_tmp_*` を追加済。
#
# ADR-007 (custom linter layer boundary) との関係:
# - 本 stage (`scratch_file_warning`) = pre-push 時点で `@` commit に含まれる
#   ファイルを `jj file list -r @` で列挙し検査 (= push 直前の最終防衛層)
# - ADR-007 § custom_lint_rule = PostToolUse hook で AI が edit/write した瞬間に
#   text 内容を regex で検査 (= 編集時の即時検出層)
# 両者は異なる timing で動作し、scratch file 検出は本 stage に集約する設計
# (scratch file は通常 .gitignore 対象で text content 検査の対象外のため)。
# ---------------------------------------------------------------------------
[scratch_file_warning]
enabled = true
patterns = ["__*", "_tmp_*"]

# ---------------------------------------------------------------------------
# [pr_size_check] — 順位 151 (Bundle "既存ルール仕組み化"): PR diff サイズ検査。
# `jj diff --stat -r '<default_branch>..@'` で PR 範囲の insertions + deletions を計測し、
# `~/.claude/rules/common/git-workflow.md` § Multi-PR chaining の「1 PR あたり 250-800 lines」
# 目安を決定論的に維持する。large PR は review iteration cost を増大させる構造リスク。
#
# ADR-039 (Experimental feature 標準パターン) 3 点セット:
# - **Config opt-in**: 試験運用のため default OFF。本リポジトリでは明示的に
#   `enabled = true` で dogfood を開始。section 不在 / enabled 未設定では完全 skip。
# - **Kill-switch**: `enabled = false` で完全停止。env `PR_SIZE_CHECK_OVERRIDE=1` で
#   個別 push の意図的バイパス可能 (大型 refactoring 時)。
# - **Bounded lifetime**: 本リポジトリで 3-5 PR の dogfood 後 (false positive 観測 /
#   検出効果 / override 使用頻度) に default-ON 昇格 or 却下を判定。判定結果は
#   `src/cli-push-runner/src/stages/pr_size_check.rs` module doc + 本 section コメント
#   に反映する。
#
# 2 段階閾値:
# - `warning_threshold` (default 800): 超過時は警告ログのみ (push 続行)
# - `block_threshold`   (default 1500): 超過時は push を block (override で bypass 可能)
#
# revset は `format!("{}..@", default_branch)` 形式で組立 (rule⑫
# `no-hardcoded-jj-revset-range` 適用)。alternative branch (`main` 等) は本 section
# で `default_branch = "main"` を明示すれば切替可能。
# ---------------------------------------------------------------------------
[pr_size_check]
enabled = true
default_branch = "master"
warning_threshold = 800
block_threshold = 1500

# ---------------------------------------------------------------------------
# [docs_only_routing] — T11 (push パイプライン改善): docs-only / 空 diff の決定論 routing。
# PR 範囲 (`<default_branch>..@`) が docs-only (ADR-035 path 基準) のとき、diff で
# 結果が変わり得ない Rust の quality_gate group (既定 `rust-lint-test`、実測 ~50s) を
# quality_gate 前に決定論的に skip する。docs-only push でも毎回 clippy + cargo test +
# `--ignored` を払っていた無駄を落とす。
#
# **takt (AI レビュー) は skip しない**: path 基準からは「Rust テスト結果が不変」は
# 演繹できるが「レビュー不要」は演繹できない (docs の内容・cross-ref・trust boundary は
# 誤り得る。ADR-035 §適用する criteria、ADR-056 T10 dogfood で reviewer が docs の
# 事実誤りを検出した実績)。JS 系 group (`lint` の `pnpm lint:docs`) は docs の markdown
# lint そのものなので維持される。設計詳細: docs/adr/adr-057-docs-only-deterministic-routing.md
#
# ADR-039 (Experimental feature 標準パターン) 3 点セット:
# - **Config opt-in**: 試験運用のため default OFF。本リポジトリでは明示的に
#   `enabled = true` で dogfood を開始。section 不在 / enabled 未設定では完全 skip
#   (= 従来どおり全 group 実行)。派生 repo の templates は本 section を置かない。
# - **Kill-switch**: `enabled = false` で完全停止。env `DOCS_ONLY_ROUTING_DISABLE=1`
#   で個別 push の意図的バイパス (docs-only でも Rust gate を強制実行したいとき)。
# - **Bounded lifetime**: 3-5 docs-only PR の dogfood 後 (誤 skip の有無 = docs-only 判定
#   されたが実は Rust に影響していた、が無いか) に default-ON 昇格 or 却下を判定。判定は
#   docs/adr/adr-057-docs-only-deterministic-routing.md の bounded lifetime に引き継ぐ。
#
# `default_branch` は `[pr_size_check]` の `default_branch` と**論理的に同一の値**を保つ
# こと (両者とも PR の base branch を指す)。食い違うと一方が誤った PR 範囲を見る
# (ADR-051 cross-config coupling)。`skip_groups` 未指定時は `["rust-lint-test"]`
# (`cli-pr-monitor` の gate group 名と一致)。
#
# fail-closed (ADR-043): jj 失敗 / summary parse 不能 / 除外パス混入時は全 group を実行する。
# ---------------------------------------------------------------------------
[docs_only_routing]
enabled = true
default_branch = "master"
skip_groups = ["rust-lint-test"]

[quality_gate]
parallel = true
# step_timeout は group 単位ではなく **コマンド単位** に適用される (stages/quality_gate.rs の run_group)。
# したがって全 group 中で最も遅い 1 コマンドが下限を決める。
# 履歴: 120s (Phase b 当初) → 180s (PR #132、Phase b' で 12 件 mistral invoke が 120s 境界) →
# 600s (Phase C、num_ctx 8192 → 32768 で 1 件あたり latency が 5-20s → 30-90s に増加、`cargo test -- --ignored`
#   全体で local 269s 観測のため 180s 超過) →
# 300s (T1 / PR #279。600s に上げた主因である Ollama eval を `--ignored` から除外したため前提が解消。
#   2026-07-16 実測 (32 core / target cold・registry warm) では最遅コマンドが `cargo test` の 28s
#   (clippy 8s / `--ignored` 19s / pnpm 系は全て 1-2s)。28s に対し約 10 倍のマージンを取りつつ、
#   ハング検知を 600s から半減させる。cold registry からの bootstrap (依存 199 件の download) は
#   未実測だがこのマージン内に収まる想定。誤 timeout が出るなら値を戻すこと)
step_timeout = 300

# `pnpm lint:docs` (cli-docs-lint) は ADR-039 試験運用標準パターンを適用:
# - Config opt-in: 派生 repo の templates/push-runner-config.toml では本コマンドを除外。
#   本リポジトリで明示的に追加して dogfood を開始。
# - Kill-switch: 環境変数 CLI_DOCS_LINT_DISABLE=1 で個別 push の意図的バイパス。
#   永続的な無効化は本 commands array から "pnpm lint:docs" を削除する revert PR。
# - Bounded lifetime: 3-5 PR の dogfood (false positive 観測 / 検出効果 /
#   override 使用頻度) 後に templates への default-ON 昇格 or 却下を判定。
[[quality_gate.groups]]
name = "lint"
commands = ["pnpm lint", "pnpm lint:docs"]

[[quality_gate.groups]]
name = "test"
commands = ["pnpm test", "pnpm test:e2e"]

[[quality_gate.groups]]
name = "build"
commands = ["pnpm build"]

# Rust lint + test group: push pipeline でのみ実行。
# PostToolUse / Stop hook では実行せず、イテレーション速度を保護する。
# ADR-026 により Cargo workspace 化したため、workspace 全体を 1 コマンドで回せる。
# 順位 175 (PR #185 T1-#1): cargo clippy を先頭に追加。Rust lint structural gap を補填。
#   cargo test と同 group に置くことで target dir のロック衝突 (並列 cargo invocation) を回避。
# 1 つ目: clippy (lint、cargo test より高速で fail fast)。--all-targets で test コードも
#   lint 対象にし (#[cfg(test)] / integration test の lint gap 解消、順位259 = PR #247 の
#   useless_format が cargo test 段階まで顕在化した手戻り由来)、--all-features で将来の
#   feature-gated コードも検査する (現時点は全 crate [features] 未定義で no-op、将来の保険)。
# 2 つ目: unit tests (並列実行可、高速)
# 3 つ目: 統合テスト (#[ignore] 付き、cwd 依存のため --test-threads=1 必須)
[[quality_gate.groups]]
name = "rust-lint-test"
commands = [
  "cargo clippy --workspace --all-targets --all-features -- -D warnings",
  "cargo test",
  "cargo test -- --ignored --test-threads=1",
]

[diff]
command = "jj diff -r @"
output_path = ".takt/review-diff.txt"
# timeout (T6): 未指定時は 60s (DEFAULT_DIFF_TIMEOUT_SECS)。旧実装は無限待ちで、
# ADR-045 の並列 workspace 運用で jj lock 競合が起きるとパイプラインが無言ハングした。
# 超過時は diff 取得失敗 = exit 5 で中断する (fail-closed / ADR-043)。
# 他の jj 系 (bookmark_check 30s) より長いのは snapshot + 大 diff 書き出しを伴うため。
# 大 diff / 低速環境で誤 timeout する場合のみ延長する (例: timeout = 180)。

# ---------------------------------------------------------------------------
# [lint_screen] — Phase c (§8.E lint screen facet) — ADR-038 試験運用配下。
# diff を mistral:7b に流して lint 一次フィルタの所見を markdown として出力する。
# 詳細: docs/adr/adr-038-local-llm-finding-classification.md
# default OFF。手動で enabled = true にしたうえで Ollama 起動 + cli-finding-classifier.exe 配備を確認する。
# Phase b' agreement 75% (conditional GO) のため gating はせず report のみ出力。
# Ollama down / timeout / diff 過大時は skip + warn (push を block しない)。
#
# **消費側が不在 (2026-07-17, push T10 / ADR-056)**: 本 section が生成する
# `output_path` の report を読む facet は現在存在しない。`review-simplicity.md` の
# 参照セクションが唯一の読み手だったが、`enabled = false` 下では恒常デッドウェイト
# (毎 review に注入されるが対象ファイルが常に不在) のため T10 で削除した。
# したがって **`enabled = true` にするだけでは report は生成されるが誰も読まない**
# (silent no-op)。再有効化する際は review-simplicity.md への参照セクション復活を
# セットで行うこと。復活時の原文は ADR-056 の commit の diff から復元できる。
# ---------------------------------------------------------------------------
[lint_screen]
enabled = false
# 以下は default 値、明示しなくてもよいが意図を残すなら明示推奨
exe_path = ".claude/cli-finding-classifier.exe"
model = "mistral:7b"
endpoint = "http://localhost:11434"
timeout_secs = 60
max_diff_lines = 5000
output_path = ".takt/lint-screen-report.md"

# ---------------------------------------------------------------------------
# [pre_push_review] — 撤去済み (ADR-047 却下、2026-07-19)。
# 反証 (refute) facet: reviewers と fix の間に verify(refute, haiku) を挟む試験運用
# だったが、dogfood 26 run で verify の finding 却下 0 件 (ADR-056 の anomaly policy
# fact-check 義務 = inline 反証が上流で FP を枯らした) のため却下。section 不在 =
# resolve_takt_workflow は現行 pre-push-review.yaml を使う (default OFF と同じ経路)。
# 却下根拠・一般反証機構との構成差: docs/adr/adr-047-prepush-refute-facet.md
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# [post_takt_regate] — T12 (push パイプライン改善): fix 後の決定論再ゲート。
# takt (reviewers → fix loop) が作業コピーを書き換えた場合にのみ quality_gate を
# 再実行する。takt の後に決定論検証が無く、fix.md の自己申告 (虚偽ではないが検証不足の
# fully_resolved: 例 `cargo test` は通したが `#[ignore]` 統合テスト未実行) が回帰を
# 素通しさせ得た穴を塞ぐ。post-PR 経路は PR #224 の実害後に決定論 gate
# (cli-pr-monitor/src/stages/gate.rs) で塞いだが、pre-push 経路は未対応だった。
# あわせて fix.md の workspace 全体 build + `--ignored` 統合テストの自己申告義務を縮小し、
# その検証を本 stage に委譲する (ADR-037 §Mitigations の pre-push 拡張)。
#
# 変化検出 (ADR-021): Stage 1.5 が書き出した diff snapshot を takt 起動前に保持し、
# takt 後に `[diff] command` を再取得して前後比較する。一致 = 作業コピー不変 = fix は
# コードを書き換えていない → re-gate skip。差分あり → quality_gate 全 group を再実行。
# snapshot 前後比較は metadata のみの変化に不感 (ADR-021 § commit_id 単独比較の限界)。
# 設計詳細: docs/adr/adr-058-post-takt-regate.md
#
# ADR-039 (Experimental feature 標準パターン) 3 点セット:
# - **Config opt-in**: 試験運用のため default OFF。section 不在 / enabled 未設定 /
#   enabled = false のいずれも re-gate を完全 skip (= takt 後に再検証なし = 従来挙動)。
#   本リポジトリでは明示的に `enabled = true` で dogfood を開始。派生 repo の templates は
#   本 section を置かず default OFF を継承する。
# - **Kill-switch**: `enabled = false` で完全停止。env `POST_TAKT_REGATE_DISABLE=1` で
#   個別 push の意図的バイパス (再ゲートを飛ばして push したいとき)。**この場合 fix step の
#   `--ignored` 自己検証も縮小済みのため、workspace + --ignored の検証が抜ける** — 意図的
#   バイパス時のみの trade-off (fix.md の delegation 注記に明記)。
# - **Bounded lifetime**: fix 発生 push で re-gate が破壊的変更を検出して block する効果と、
#   誤 block (fix が実は無害なのに gate が落ちる) の有無を観測後、default-ON 昇格 or 却下を
#   判定。判定は docs/adr/adr-058-post-takt-regate.md の bounded lifetime に引き継ぐ。
#
# fail-closed (ADR-043): snapshot 前後どちらかが取得不能なときは「変化あり」に倒して
# re-gate を実行する。判定不能を「skip 可能」に倒すことはしない (post-pr gate と同じ方向)。
# ---------------------------------------------------------------------------
[post_takt_regate]
enabled = true

[takt]
workflow = "pre-push-review"
task = "pre-push review"
extra_args = ["--pipeline", "--skip-git"]

[push]
# push-runner は bookmark_check stage が検出した非 trunk bookmark を `-b <name>` として
# この base command に付与する (ADR-045 事故 follow-up: 旧 `--all` は並列 workspace の
# 他 bookmark を巻き込むため廃止)。jj 0.42 の `-b` は未 tracking の新規 bookmark を
# 自動 track して push するため `--all` は不要。`--all` 等の対象明示を含む command は
# そのまま実行される (後方互換、stages/push.rs build_push_command)。
command = "jj git push"
