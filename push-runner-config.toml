# push-runner-config.toml -- cli-push-runner (takt ベース) の設定
#
# pnpm push で起動される push-runner.exe がこのファイルを読み込む。
# カレントディレクトリ (リポジトリルート) を優先的に検索する。

# ---------------------------------------------------------------------------
# [scratch_file_warning] — 順位 1 (PR #85 T1-4): scratch ファイル混入の防御層。
# `@` commit に `__*` 等の scratch ファイルが含まれていないか push 前に検査し、
# 検出時は push を block する。jj auto-snapshot 環境で .gitignore 漏れがあると
# scratch ファイルが PR に混入する事故 (PR #85 で実証) の構造的予防。
#
# ADR-039 (Experimental feature 標準パターン) 3 点セット:
# - **Config opt-in**: 試験運用のため default OFF。本リポジトリでは明示的に
#   `enabled = true` で dogfood を開始。section 不在 / enabled 未設定では完全 skip。
# - **Kill-switch**: `enabled = false` で完全停止。env `SCRATCH_FILE_WARNING_OVERRIDE=1`
#   で個別 push の意図的バイパスも可能。
# - **Bounded lifetime**: 本リポジトリで 3-5 PR の dogfood 後 (false positive 観測 /
#   検出効果 / override 使用頻度) に default-ON 昇格 or 却下を判定。判定結果は
#   `src/cli-push-runner/src/stages/scratch_file_warning.rs` module doc + 本 section
#   コメントに反映する。
#
# 順位 5 (AI 生成一時スクリプト pattern) で `_tmp_*` 等の追加 pattern を本 section
# の `patterns` に追加する (補完アプローチ)。Bundle 3 で `_tmp_*` を追加済。
#
# ADR-007 (custom linter layer boundary) との関係:
# - 本 stage (`scratch_file_warning`) = pre-push 時点で `@` commit に含まれる
#   ファイルを `jj file list -r @` で列挙し検査 (= push 直前の最終防衛層)
# - ADR-007 § custom_lint_rule = PostToolUse hook で AI が edit/write した瞬間に
#   text 内容を regex で検査 (= 編集時の即時検出層)
# 両者は異なる timing で動作し、scratch file 検出は本 stage に集約する設計
# (scratch file は通常 .gitignore 対象で text content 検査の対象外のため)。
# ---------------------------------------------------------------------------
[scratch_file_warning]
enabled = true
patterns = ["__*", "_tmp_*"]

# ---------------------------------------------------------------------------
# [pr_size_check] — 順位 151 (Bundle "既存ルール仕組み化"): PR diff サイズ検査。
# `jj diff --stat -r '<default_branch>..@'` で PR 範囲の insertions + deletions を計測し、
# `~/.claude/rules/common/git-workflow.md` § Multi-PR chaining の「1 PR あたり 250-800 lines」
# 目安を決定論的に維持する。large PR は review iteration cost を増大させる構造リスク。
#
# ADR-039 (Experimental feature 標準パターン) 3 点セット:
# - **Config opt-in**: 試験運用のため default OFF。本リポジトリでは明示的に
#   `enabled = true` で dogfood を開始。section 不在 / enabled 未設定では完全 skip。
# - **Kill-switch**: `enabled = false` で完全停止。env `PR_SIZE_CHECK_OVERRIDE=1` で
#   個別 push の意図的バイパス可能 (大型 refactoring 時)。
# - **Bounded lifetime**: 本リポジトリで 3-5 PR の dogfood 後 (false positive 観測 /
#   検出効果 / override 使用頻度) に default-ON 昇格 or 却下を判定。判定結果は
#   `src/cli-push-runner/src/stages/pr_size_check.rs` module doc + 本 section コメント
#   に反映する。
#
# 2 段階閾値:
# - `warning_threshold` (default 800): 超過時は警告ログのみ (push 続行)
# - `block_threshold`   (default 1500): 超過時は push を block (override で bypass 可能)
#
# revset は `format!("{}..@", default_branch)` 形式で組立 (rule⑫
# `no-hardcoded-jj-revset-range` 適用)。alternative branch (`main` 等) は本 section
# で `default_branch = "main"` を明示すれば切替可能。
# ---------------------------------------------------------------------------
[pr_size_check]
enabled = true
default_branch = "master"
warning_threshold = 800
block_threshold = 1500

[quality_gate]
parallel = true
# step_timeout 履歴: 120s (Phase b 当初) → 180s (PR #132、Phase b' で 12 件 mistral invoke が 120s 境界) →
# 600s (Phase C、num_ctx 8192 → 32768 で 1 件あたり latency が 5-20s → 30-90s に増加、`cargo test -- --ignored`
# 全体で local 269s 観測のため 180s 超過。32768 入れることで context overflow 解消するが per-invoke latency は cost)
step_timeout = 600

# `pnpm lint:docs` (cli-docs-lint) は ADR-039 試験運用標準パターンを適用:
# - Config opt-in: 派生 repo の templates/push-runner-config.toml では本コマンドを除外。
#   本リポジトリで明示的に追加して dogfood を開始。
# - Kill-switch: 環境変数 CLI_DOCS_LINT_DISABLE=1 で個別 push の意図的バイパス。
#   永続的な無効化は本 commands array から "pnpm lint:docs" を削除する revert PR。
# - Bounded lifetime: 3-5 PR の dogfood (false positive 観測 / 検出効果 /
#   override 使用頻度) 後に templates への default-ON 昇格 or 却下を判定。
[[quality_gate.groups]]
name = "lint"
commands = ["pnpm lint", "pnpm lint:docs"]

[[quality_gate.groups]]
name = "test"
commands = ["pnpm test", "pnpm test:e2e"]

[[quality_gate.groups]]
name = "build"
commands = ["pnpm build"]

# Rust lint + test group: push pipeline でのみ実行。
# PostToolUse / Stop hook では実行せず、イテレーション速度を保護する。
# ADR-026 により Cargo workspace 化したため、workspace 全体を 1 コマンドで回せる。
# 順位 175 (PR #185 T1-#1): cargo clippy を先頭に追加。Rust lint structural gap を補填。
#   cargo test と同 group に置くことで target dir のロック衝突 (並列 cargo invocation) を回避。
# 1 つ目: clippy (lint、cargo test より高速で fail fast)。--all-targets で test コードも
#   lint 対象にし (#[cfg(test)] / integration test の lint gap 解消、順位259 = PR #247 の
#   useless_format が cargo test 段階まで顕在化した手戻り由来)、--all-features で将来の
#   feature-gated コードも検査する (現時点は全 crate [features] 未定義で no-op、将来の保険)。
# 2 つ目: unit tests (並列実行可、高速)
# 3 つ目: 統合テスト (#[ignore] 付き、cwd 依存のため --test-threads=1 必須)
[[quality_gate.groups]]
name = "rust-lint-test"
commands = [
  "cargo clippy --workspace --all-targets --all-features -- -D warnings",
  "cargo test",
  "cargo test -- --ignored --test-threads=1",
]

[diff]
command = "jj diff -r @"
output_path = ".takt/review-diff.txt"

# ---------------------------------------------------------------------------
# [lint_screen] — Phase c (§8.E lint screen facet) — ADR-038 試験運用配下。
# diff を mistral:7b に流して lint 一次フィルタの所見を markdown として出力する。
# 詳細: docs/adr/adr-038-local-llm-finding-classification.md
# default OFF。手動で enabled = true にしたうえで Ollama 起動 + cli-finding-classifier.exe 配備を確認する。
# Phase b' agreement 75% (conditional GO) のため gating はせず report のみ出力。
# Ollama down / timeout / diff 過大時は skip + warn (push を block しない)。
# ---------------------------------------------------------------------------
[lint_screen]
enabled = false
# 以下は default 値、明示しなくてもよいが意図を残すなら明示推奨
exe_path = ".claude/cli-finding-classifier.exe"
model = "mistral:7b"
endpoint = "http://localhost:11434"
timeout_secs = 60
max_diff_lines = 5000
output_path = ".takt/lint-screen-report.md"

# ---------------------------------------------------------------------------
# [pre_push_review] — WP-06 / ADR-047 (試験運用): 反証 (refute) facet。
# reviewers と fix の間に verify(refute, haiku) step を挟み、reviewer(sonnet) の
# false positive finding を fix 前に反証・却下して無駄な fix iteration を削減する。
# 誤って却下した真の finding は post-pr CodeRabbit 層で回収される (安全網)。
# 設計背景・詳細: docs/adr/adr-047-prepush-refute-facet.md
#
# ADR-039 (Experimental feature 標準パターン) 3 点セット:
# - **Config opt-in**: default OFF。`refute_enabled = true` かつ `refute_workflow`
#   指定時のみ verify 入り workflow (pre-push-review-refute) に切替。section 不在 /
#   `refute_enabled` 未設定 / false では現行 pre-push-review (verify なし) を使う
#   (workflow 解決は cli-push-runner の resolve_takt_workflow に単一集約)。
#   本 PR は導入のみで default OFF。dogfood (refute_enabled = true) は本 PR マージ後に
#   別 PR で開始する (未検証 refute でこの導入 PR 自体を自己レビューしないため)。
#   templates は default OFF を継承。
# - **Kill-switch**: `refute_enabled = false` で即座に現行フローへ (verify 完全 skip)。
#   永続停止は `.takt/workflows/pre-push-review-refute.yaml` を削除する revert PR。
# - **Bounded lifetime**: 2 週間 dogfood 後に採否判定。fix iteration 数の減少 かつ
#   reject 誤りが CodeRabbit 層で回収されている (安全網実証) を確認できたら採用
#   (pre-push-review.yaml へ verify を統合)、未達なら却下。判定結果は
#   docs/adr/adr-047-prepush-refute-facet.md に反映する。
# ---------------------------------------------------------------------------
[pre_push_review]
refute_enabled = false
refute_workflow = "pre-push-review-refute"

[takt]
workflow = "pre-push-review"
task = "pre-push review"
extra_args = ["--pipeline", "--skip-git"]

[push]
# push-runner は bookmark_check stage が検出した非 trunk bookmark を `-b <name>` として
# この base command に付与する (ADR-045 事故 follow-up: 旧 `--all` は並列 workspace の
# 他 bookmark を巻き込むため廃止)。jj 0.42 の `-b` は未 tracking の新規 bookmark を
# 自動 track して push するため `--all` は不要。`--all` 等の対象明示を含む command は
# そのまま実行される (後方互換、stages/push.rs build_push_command)。
command = "jj git push"
