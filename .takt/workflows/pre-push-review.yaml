name: pre-push-review
description: >
  AI review-only workflow invoked by push-runner (Rust exe).
  quality_gate and push are handled outside takt by the Rust exe.
  Flow: (simplicity + security reviewers in parallel) -> fix (loop) -> supervise.
  Each reviewer reads .takt/review-diff.txt directly.
  Terminates with COMPLETE when reviewers approve, or after a single
  fix_supervisor adjustment when supervise flags remaining issues.

workflow_config:
  provider_options:
    codex:
      network_access: true
    opencode:
      network_access: true

max_steps: 30
initial_step: reviewers

loop_monitors:
  - cycle:
      - reviewers
      - fix
    threshold: 2
    judge:
      persona: supervisor
      instruction: loop-monitor-reviewers-fix
      rules:
        - condition: Healthy (progress being made)
          next: reviewers
        - condition: Unproductive (repeated findings, fixes not applied)
          next: supervise
steps:
  # ---------------------------------------------------------------------------
  # Step 1: reviewers (parallel)
  #   Two reviewers -- simplicity (diff-local) and security.
  # ---------------------------------------------------------------------------
  - name: reviewers
    parallel:
      - name: simplicity-review
        edit: false
        persona: simplicity-reviewer
        model: sonnet
        policy: review
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
        instruction: review-simplicity
        output_contracts:
          report:
            - name: simplicity-review.md
              format: simplicity-review
        rules:
          - condition: approved
          - condition: needs_fix

      - name: security-review
        edit: false
        persona: security-reviewer
        model: sonnet
        policy: review
        knowledge: security
        provider_options:
          claude:
            allowed_tools:
              - Read
              - Glob
              - Grep
        instruction: review-security
        output_contracts:
          report:
            - name: security-review.md
              format: security-review
        rules:
          - condition: approved
          - condition: needs_fix

    rules:
      - condition: all("approved")
        next: COMPLETE
      - condition: any("needs_fix")
        next: fix

  # ---------------------------------------------------------------------------
  # Step 2: fix
  #   Applies fixes for every open finding from the reviewers.
  #   The loop_monitor above caps iterations at 2.
  # ---------------------------------------------------------------------------
  - name: fix
    edit: true
    persona: coder
    model: sonnet
    policy:
      - coding
      - testing
    knowledge:
      - security
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
    required_permission_mode: edit
    pass_previous_response: false
    instruction: fix
    rules:
      - condition: Fixes complete
        next: reviewers
      - condition: Unable to proceed with fixes
        next: supervise

  # ---------------------------------------------------------------------------
  # Step 3: supervise
  #   Single-shot decision node (not a loop). Determines whether to push or
  #   route to fix_supervisor for one final adjustment before COMPLETE.
  # ---------------------------------------------------------------------------
  - name: supervise
    edit: false
    persona: supervisor
    model: sonnet
    policy: review
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
    instruction: supervise
    pass_previous_response: false
    output_contracts:
      report:
        - name: supervisor-validation.md
          format: supervisor-validation
    rules:
      - condition: All validations complete, ready to push
        next: COMPLETE
      - condition: Issues detected
        next: fix_supervisor

  - name: fix_supervisor
    edit: true
    persona: coder
    model: sonnet
    policy:
      - coding
      - testing
    knowledge:
      - security
    provider_options:
      claude:
        allowed_tools:
          - Read
          - Glob
          - Grep
          - Edit
          - Write
          - Bash
    required_permission_mode: edit
    instruction: fix-supervisor
    pass_previous_response: false
    rules:
      - condition: Fixes for supervisor findings complete
        next: COMPLETE
      - condition: Unable to proceed with fixes
        next: COMPLETE
